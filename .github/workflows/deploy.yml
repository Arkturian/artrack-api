name: Build & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clone audio-guide library as sibling
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # artrack-api/frontend/package.json depends on file:../../audio-guide
          # So the library must live as a sibling of the artrack-api workspace.
          git clone https://x-access-token:$GH_TOKEN@github.com/apopovic77/audio-guide.git ../audio-guide
          echo "audio-guide cloned. Sibling layout:"
          ls -la ..

      - name: Build audio-guide library
        run: |
          cd ../audio-guide
          npm install
          npm run build
          ls -la dist/ | head -5

      - name: Build artrack-api frontend
        run: |
          cd frontend
          npm install
          npm run build
          echo "frontend/dist contents:"
          ls -la dist/

      - name: Upload frontend/dist to server
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.DEPLOY_HOST }}
          REMOTE_USER: ${{ secrets.DEPLOY_USER }}
          REMOTE_PORT: ${{ secrets.DEPLOY_PORT || 22 }}
          ARGS: "-rlgoDzvc --delete"
          SOURCE: "frontend/dist/"
          TARGET: "/var/www/api-artrack.arkturian.com/frontend/dist/"

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        env:
          MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: MAPBOX_ACCESS_TOKEN
          script: |
            set -e

            REPO_URL="https://github.com/apopovic77/artrack-api.git"
            REPO_PATH="/opt/repos/artrack-api"
            DEPLOY_PATH="/var/www/api-artrack.arkturian.com"
            BACKUP_DIR="/var/backups"
            BACKUP_PREFIX="artrack-api"
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            BACKUP_PATH="$BACKUP_DIR/${BACKUP_PREFIX}-${TIMESTAMP}"

            # Clone or update repo
            if [ ! -d "$REPO_PATH" ]; then
              echo "Cloning repository..."
              mkdir -p /opt/repos
              git clone "$REPO_URL" "$REPO_PATH"
            fi

            cd "$REPO_PATH"
            git fetch origin main
            git reset --hard origin/main

            # Create backup
            if [ -d "$DEPLOY_PATH" ]; then
              echo "Creating backup..."
              mkdir -p "$BACKUP_DIR"
              cp -r "$DEPLOY_PATH" "$BACKUP_PATH"
              echo "Backup saved to: $BACKUP_PATH"
            fi

            # Deploy
            echo "Deploying FastAPI application..."
            mkdir -p "$DEPLOY_PATH"
            rsync -av --delete \
              --exclude='.git' \
              --exclude='__pycache__' \
              --exclude='*.pyc' \
              --exclude='.env' \
              --exclude='venv' \
              --exclude='frontend/dist' \
              --exclude='frontend/node_modules' \
              "$REPO_PATH/" "$DEPLOY_PATH/"

            # Install dependencies in deployment directory
            cd "$DEPLOY_PATH"
            /root/.pyenv/versions/3.11.9/bin/pip install -r requirements.txt

            # Set permissions
            chown -R www-data:www-data "$DEPLOY_PATH"
            chmod -R 755 "$DEPLOY_PATH"

            # Database Migration with Backup
            DB_PATH="/var/lib/api-arkturian/artrack.db"
            DB_BACKUP="/var/backups/artrack-db-${TIMESTAMP}.db"

            if [ -f "$DB_PATH" ]; then
              echo "📦 Backing up database..."
              cp "$DB_PATH" "$DB_BACKUP"
              echo "✅ Database backed up to: $DB_BACKUP"
            fi

            # Run Alembic migrations (if alembic directory exists)
            if [ -d "alembic" ]; then
              echo "🔄 Running database migrations..."
              /root/.pyenv/versions/3.11.9/bin/alembic upgrade head || {
                echo "❌ Migration failed! Restoring backup..."
                cp "$DB_BACKUP" "$DB_PATH"
                exit 1
              }
              echo "✅ Migrations completed successfully"
            else
              echo "⚠️  No alembic migrations found (skipping)"
            fi

            # Run custom migrations (if migrations directory exists)
            if [ -d "migrations" ]; then
              echo "🔄 Running custom migrations..."
              for migration in migrations/*.py; do
                echo "  Running: $migration"
                DATABASE_PATH="$DB_PATH" /root/.pyenv/versions/3.11.9/bin/python "$migration" || {
                  echo "❌ Migration $migration failed!"
                  exit 1
                }
              done
              echo "✅ Custom migrations completed"
            fi

            # Write systemd drop-in with runtime env vars (mapbox token etc).
            # Drop-ins under /etc/systemd/system/<svc>.service.d/ are merged
            # into the main unit file by systemd without needing to touch it.
            if [ -n "$MAPBOX_ACCESS_TOKEN" ]; then
              echo "Writing systemd drop-in with MAPBOX_ACCESS_TOKEN..."
              mkdir -p /etc/systemd/system/artrack-api.service.d
              cat > /etc/systemd/system/artrack-api.service.d/env.conf <<EOF
            [Service]
            Environment="MAPBOX_ACCESS_TOKEN=$MAPBOX_ACCESS_TOKEN"
            Environment="CLOUD_API_BOOTSTRAP=https://cloud.arkserver.arkturian.com"
            EOF
              chmod 644 /etc/systemd/system/artrack-api.service.d/env.conf
              systemctl daemon-reload
              echo "✅ systemd drop-in written"
            else
              echo "⚠️  MAPBOX_ACCESS_TOKEN not set — skipping drop-in write"
            fi

            # Restart service
            echo "Restarting artrack-api service..."
            systemctl restart artrack-api

            echo "✅ Deployment completed successfully!"
            systemctl status artrack-api --no-pager -l

      - name: Notify on success
        if: success()
        run: echo "✅ Deployment successful for commit ${{ github.sha }}"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Deployment failed for commit ${{ github.sha }}"

  trigger-sdk-regeneration:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Trigger TypeScript SDK regeneration
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: apopovic77/artrack-api-typescript-sdk
          event-type: openapi-updated

      - name: Trigger C# SDK regeneration
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: apopovic77/artrack-api-csharp-sdk
          event-type: openapi-updated

      - name: Trigger Swift SDK regeneration
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: apopovic77/artrack-sdk-swift
          event-type: openapi-updated

  trigger-e2e-tests:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Trigger E2E tests
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: apopovic77/api-e2e-tests
          event-type: artrack-api-deployed
          client-payload: '{"api": "artrack", "sha": "${{ github.sha }}"}'

name: Deploy to Production (arkserver)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build application
        run: echo 'No build needed for FastAPI'

      - name: Deploy to arkserver
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e

            DEPLOY_PATH="/var/www/api-artrack.arkserver.arkturian.com"
            BACKUP_DIR="/var/backups"
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)

            # DB backup (Postgres since 2026-07-05 cutover)
            echo "Backing up Postgres..."
            sudo -n -u postgres pg_dump -Fc artrack > /tmp/artrack-${TIMESTAMP}.dump
            sudo -n mkdir -p "$BACKUP_DIR"
            sudo -n mv /tmp/artrack-${TIMESTAMP}.dump "$BACKUP_DIR/"
            # keep the last 14 dumps
            ls -1t "$BACKUP_DIR"/artrack-*.dump 2>/dev/null | tail -n +15 | xargs -r sudo -n rm --

            # Code update (deploy dir is a git clone tracking origin/main)
            cd "$DEPLOY_PATH"
            git fetch origin main
            git reset --hard origin/main

            # Dependencies into the instance venv
            ./venv/bin/pip install -q -r requirements.txt

            # Restart + health check
            sudo -n systemctl restart artrack-api
            sleep 4
            sudo -n systemctl is-active artrack-api
            curl -sf -o /dev/null http://127.0.0.1:8001/weather
            echo "✅ Deployment completed (arkserver/Postgres)"

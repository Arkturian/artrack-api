name: Dev Branch CI

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clone audio-guide library as sibling
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git clone https://x-access-token:$GH_TOKEN@github.com/apopovic77/audio-guide.git ../audio-guide

      - name: Build audio-guide library
        run: |
          cd ../audio-guide
          npm install
          npm run build

      - name: Typecheck + build artrack-api frontend
        run: |
          cd frontend
          npm install
          npm run typecheck
          npm run build

      - name: Test import
        run: python -c "import fastapi; print('FastAPI installed successfully')"
